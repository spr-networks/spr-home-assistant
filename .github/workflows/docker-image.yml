name: Docker Image CI

on:
  push:
    branches: [ dev ]
  workflow_run:
    workflows: ["Bump version"]
    types:
      - completed
    branches: [main]

jobs:

  buildx:
    runs-on: ubuntu-latest
    # Don't build/publish off a failed "Bump version" run
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
      id-token: write   # keyless cosign signing via the GitHub OIDC token
    steps:
      -
        name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: '0'
      -
        name: Get version from git
        run: echo "RELEASE_VERSION=$(git describe --tags --abbrev=0 | grep -Eo '[0-9]+\.[0-9]+.[0-9]+')" >> $GITHUB_ENV
      -
        name: Set release channel for dev
        if: ${{ github.ref_name == 'dev' }}
        run: echo "RELEASE_CHANNEL=-dev" >> $GITHUB_ENV
      -
        name: Load reproducible build pins
        run: grep -vE '^[[:space:]]*(#|$)' reproducible.env >> "$GITHUB_ENV"
      -
        name: Compute push flag
        id: repro
        run: |
          # SOURCE_DATE_EPOCH is set to 0 by build_docker_compose.sh itself.
          push=false
          if { [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.ref_name }}" = "main" ]; } \
             || { [ -n "${{ env.RELEASE_CHANNEL }}" ] && [ "${{ github.event_name }}" = "push" ]; }; then
            push=true
          fi
          echo "push=$push" >> "$GITHUB_OUTPUT"
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=${{ env.BUILDKIT_REF }}
      -
        name: Authenticate to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Authenticate to ghcr
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      -
        # The SAME reproducible build the maintainer runs locally — CI does not
        # reconstruct the build a second way. --metadata-file captures the
        # pushed digest for signing.
        name: Build (and push) with the reproducible build script
        run: |
          PUSH=""
          [ "${{ steps.repro.outputs.push }}" = "true" ] && PUSH="--push"
          ./build_docker_compose.sh \
            --set "*.platform=linux/amd64,linux/arm64" \
            --metadata-file /tmp/bake-meta.json \
            $PUSH
      -
        name: Resolve pushed image digest
        id: digest
        if: ${{ steps.repro.outputs.push == 'true' }}
        run: |
          DIGEST=$(jq -r '.ha_sync["containerimage.digest"]' /tmp/bake-meta.json)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/spr-networks/home_assistant_integration_ha_sync@${DIGEST}" >> "$GITHUB_OUTPUT"

      # https://github.com/sigstore/cosign-installer
      - name: Install Cosign
        if: ${{ steps.repro.outputs.push == 'true' }}
        uses: sigstore/cosign-installer@v3.6.0

      - name: Sign the image with the GitHub OIDC token
        if: ${{ steps.repro.outputs.push == 'true' }}
        run: cosign sign --yes ${{ steps.digest.outputs.image }}

      # actions/attest-build-provenance needs GitHub Enterprise on private
      # repos, so the SLSA provenance attestation is done with cosign instead:
      # keyless via the GitHub OIDC token, stored beside the image, logged in
      # Rekor.
      - name: Generate SLSA provenance predicate
        if: ${{ steps.repro.outputs.push == 'true' }}
        run: |
          cat > /tmp/predicate.json <<EOF
          {
            "buildDefinition": {
              "buildType": "https://actions.github.io/buildtypes/workflow/v1",
              "externalParameters": {
                "workflow": {
                  "ref": "${{ github.ref }}",
                  "repository": "${{ github.server_url }}/${{ github.repository }}",
                  "path": ".github/workflows/docker-image.yml"
                }
              },
              "internalParameters": {
                "github": {
                  "event_name": "${{ github.event_name }}",
                  "repository_id": "${{ github.repository_id }}",
                  "repository_owner_id": "${{ github.repository_owner_id }}"
                }
              },
              "resolvedDependencies": [
                {
                  "uri": "git+${{ github.server_url }}/${{ github.repository }}@${{ github.ref }}",
                  "digest": { "gitCommit": "${{ github.sha }}" }
                }
              ]
            },
            "runDetails": {
              "builder": {
                "id": "${{ github.server_url }}/${{ github.repository }}/.github/workflows/docker-image.yml@${{ github.ref }}"
              },
              "metadata": {
                "invocationId": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}"
              }
            }
          }
          EOF

      - name: Attest build provenance with the GitHub OIDC token
        if: ${{ steps.repro.outputs.push == 'true' }}
        run: cosign attest --yes --type slsaprovenance1 --predicate /tmp/predicate.json ${{ steps.digest.outputs.image }}

      - name: Verify signature and attestation
        if: ${{ steps.repro.outputs.push == 'true' }}
        run: |
          cosign verify \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/spr-networks/home_assistant_integration/\.github/workflows/docker-image\.yml@' \
            ${{ steps.digest.outputs.image }}
          cosign verify-attestation --type slsaprovenance1 \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github\.com/spr-networks/home_assistant_integration/\.github/workflows/docker-image\.yml@' \
            ${{ steps.digest.outputs.image }}
